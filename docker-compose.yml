services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: repolens-backend
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - repolens_data:/app/backend/data
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: repolens-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  repolens_data: