services:
  - type: web
    name: repolens
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: CORS_ORIGINS
        value: https://repolens.onrender.com
      - key: REPO_STORAGE_PATH
        value: /data/repos
      - key: LOG_LEVEL
        value: INFO
      - key: OLLAMA_URL
        value: ""
    disk:
      name: repolens-data
      mountPath: /data
      sizeGB: 1
